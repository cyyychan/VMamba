# SS2Dm3: upstream Mamba3 on H*W. M3_MIMO false → SISO Triton (mamba3_siso).
# SSM_D_STATE must be >= 16: Triton tl.dot in mamba3_siso_fwd requires K>=16 (d_state=8 fails compile).
# M3_MIMO true → TileLang needs SSM_D_STATE % 16 == 0 (see vmamba SS2Dm3).
MODEL:
  TYPE: vssm
  NAME: vssm1_tiny_m3_0230
  DROP_PATH_RATE: 0.2
  VSSM:
    EMBED_DIM: 96
    DEPTHS: [ 2, 2, 5, 2 ]
    SSM_D_STATE: 16
    SSM_DT_RANK: "auto"
    SSM_RATIO: 2.0
    SSM_CONV: 3
    SSM_CONV_BIAS: false
    SSM_INIT: "v2"
    SSM_FORWARDTYPE: "m3"
    MLP_RATIO: 4.0
    DOWNSAMPLE: "v3"
    PATCHEMBED: "v2"
    NORM_LAYER: "ln2d"
